<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#1152d4",
                "background-light": "#f6f6f8",
                "background-dark": "#101622",
              },
              fontFamily: {
                "display": ["Lexend"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
      </script>
<style>
        body { font-family: 'Lexend', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden max-w-md mx-auto shadow-xl">
<!-- Header Section -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<div class="text-primary flex size-10 shrink-0 items-center justify-center rounded-lg hover:bg-primary/10 transition-colors cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">StarTrack Onboarding</h2>
</div>
<!-- Progress Bar Section -->
<div class="flex flex-col gap-3 p-4">
<div class="flex gap-6 justify-between items-end">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-normal">Biographical Data</p>
<p class="text-primary text-sm font-bold leading-normal">Step 1 of 3</p>
</div>
<div class="rounded-full bg-primary/20 h-2.5 w-full overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 33.33%;"></div>
</div>
</div>
<!-- Profile Photo Upload -->
<div class="flex p-6 @container">
<div class="flex w-full flex-col gap-4 items-center">
<div class="flex gap-4 flex-col items-center">
<div class="relative group cursor-pointer">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full ring-4 ring-primary/20 min-h-32 w-32 bg-slate-200 dark:bg-slate-800 flex items-center justify-center overflow-hidden" data-alt="User profile placeholder showing a young student avatar" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAxdpx1UKMTjSEn_mraVebeMLuc6TuQXEKqLcxt5mqVK-UFAEllfl4HOslvqVvKqdAjbC81FnQXb4xlZKYEOgnsPJ00OhRYE56mPUR9UoA4rGvOBQAzvcY_0O5a173lpe86hRNjVdDMV2ivm0JJk5UIlV3yda42f0pOmO17zkTtZhDggFz7WAwauwWzf9pPXWS9nN2KQbacUoC3XBbRNwO7V5cNswjEgEm4SaGqb--6tMDt5sAt60pf0gjwR2sqn-RqOQ6gkGrSzQ");'>
</div>
<div class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full shadow-lg border-2 border-background-light">
<span class="material-symbols-outlined text-sm">photo_camera</span>
</div>
</div>
<div class="flex flex-col items-center justify-center">
<p class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-[-0.015em] text-center">Profile Photo</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal text-center">JPG, PNG up to 2MB</p>
</div>
</div>
</div>
</div>
<!-- Form Fields -->
<div class="px-4 py-2 space-y-4">
<!-- Full Name -->
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-1.5 ml-1">Full Name</p>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-slate-900 focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 placeholder:text-slate-400 p-[15px] text-base" placeholder="Enter your legal full name" type="text"/>
</label>
<div class="grid grid-cols-1 @[400px]:grid-cols-2 gap-4">
<!-- Gender Dropdown -->
<label class="flex flex-col flex-1">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-1.5 ml-1">Gender</p>
<div class="relative">
<select class="form-select flex w-full appearance-none rounded-xl text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-slate-900 focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 p-[15px] text-base outline-none">
<option disabled="" selected="" value="">Select</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
<option value="prefer-not-to-say">Prefer not to say</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">expand_more</span>
</div>
</label>
<!-- Phone Number -->
<label class="flex flex-col flex-1">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-1.5 ml-1">Phone Number</p>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-slate-900 focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 placeholder:text-slate-400 p-[15px] text-base" placeholder="+1 (555) 000-0000" type="tel"/>
</label>
</div>
<!-- Short Bio -->
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-1.5 ml-1">Short Bio</p>
<textarea class="form-textarea flex w-full rounded-xl text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-slate-900 focus:border-primary focus:ring-2 focus:ring-primary/20 h-32 placeholder:text-slate-400 p-[15px] text-base resize-none" placeholder="Tell us about yourself, your interests and goals..."></textarea>
</label>
<!-- Skills Tag Input Area -->
<div class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-1.5 ml-1">Skills &amp; Expertise</p>
<div class="flex flex-wrap gap-2 p-3 rounded-xl border border-primary/20 bg-white dark:bg-slate-900 min-h-14">
<span class="inline-flex items-center gap-1.5 px-3 py-1 bg-primary/10 text-primary text-sm font-medium rounded-full">
                        Python <span class="material-symbols-outlined text-xs cursor-pointer">close</span>
</span>
<span class="inline-flex items-center gap-1.5 px-3 py-1 bg-primary/10 text-primary text-sm font-medium rounded-full">
                        UI Design <span class="material-symbols-outlined text-xs cursor-pointer">close</span>
</span>
<input class="flex-1 bg-transparent border-none focus:ring-0 p-0 text-sm min-w-[80px]" placeholder="Add skill..." type="text"/>
</div>
</div>
</div>
<!-- Sticky Footer Navigation -->
<div class="mt-auto p-4 bg-background-light dark:bg-background-dark border-t border-primary/10">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] hover:bg-primary/90 transition-all active:scale-[0.98] shadow-lg shadow-primary/20">
<span class="truncate">Next Step</span>
<span class="material-symbols-outlined ml-2">arrow_forward</span>
</button>
<p class="text-center text-slate-400 text-xs mt-4">All data is securely handled according to MUST StarTrack privacy guidelines.</p>
</div>
<!-- Spacer for mobile safe areas -->
<div class="h-6"></div>
</div>
</body></html>

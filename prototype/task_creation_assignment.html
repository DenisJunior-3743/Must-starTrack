<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create New Task</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-2xl mx-auto min-h-screen flex flex-col">
<!-- Top Bar -->
<header class="flex items-center p-4 md:px-6 bg-background-light dark:bg-background-dark sticky top-0 z-10 border-b border-primary/10">
<button class="text-slate-900 dark:text-slate-100 p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-xl font-bold ml-4 tracking-tight">Create New Task</h1>
<div class="flex-1"></div>
<button class="text-slate-600 dark:text-slate-400 p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">more_vert</span>
</button>
</header>
<main class="flex-1 p-4 md:p-6 space-y-6">
<!-- Project Context (Optional helper) -->
<div class="flex items-center gap-3 p-3 bg-primary/5 rounded-xl border border-primary/10">
<div class="w-10 h-10 bg-primary rounded flex items-center justify-center text-white">
<span class="material-symbols-outlined">folder</span>
</div>
<div>
<p class="text-xs font-semibold uppercase tracking-wider text-primary">Active Project</p>
<p class="font-medium">Web Platform Redesign</p>
</div>
</div>
<!-- Task Form -->
<form class="space-y-6">
<!-- Task Title -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Task Title</label>
<input class="w-full h-14 px-4 bg-white dark:bg-slate-900 border border-primary/20 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="e.g. Design system documentation" type="text"/>
</div>
<!-- Description -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Description</label>
<textarea class="w-full min-h-[120px] p-4 bg-white dark:bg-slate-900 border border-primary/20 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="Detail the scope and requirements of this task..."></textarea>
</div>
<!-- Multi-Column Grid for Priority, Date and Assignee -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Priority Level -->
<div class="space-y-3">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Priority Level</label>
<div class="flex h-12 bg-primary/10 rounded-xl p-1">
<label class="flex-1 cursor-pointer group">
<input class="sr-only peer" name="priority" type="radio" value="low"/>
<div class="h-full flex items-center justify-center rounded-lg text-sm font-medium transition-all peer-checked:bg-white dark:peer-checked:bg-slate-800 peer-checked:text-primary peer-checked:shadow-sm text-slate-600 dark:text-slate-400">
                                    Low
                                </div>
</label>
<label class="flex-1 cursor-pointer group">
<input checked="" class="sr-only peer" name="priority" type="radio" value="medium"/>
<div class="h-full flex items-center justify-center rounded-lg text-sm font-medium transition-all peer-checked:bg-white dark:peer-checked:bg-slate-800 peer-checked:text-primary peer-checked:shadow-sm text-slate-600 dark:text-slate-400">
                                    Medium
                                </div>
</label>
<label class="flex-1 cursor-pointer group">
<input class="sr-only peer" name="priority" type="radio" value="high"/>
<div class="h-full flex items-center justify-center rounded-lg text-sm font-medium transition-all peer-checked:bg-white dark:peer-checked:bg-slate-800 peer-checked:text-primary peer-checked:shadow-sm text-slate-600 dark:text-slate-400">
                                    High
                                </div>
</label>
</div>
</div>
<!-- Due Date -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Due Date</label>
<div class="relative">
<input class="w-full h-12 px-4 bg-white dark:bg-slate-900 border border-primary/20 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all" type="date"/>
</div>
</div>
<!-- Assignee Dropdown -->
<div class="space-y-2 md:col-span-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Assign To Collaborator</label>
<div class="relative">
<select class="w-full h-14 pl-12 pr-4 appearance-none bg-white dark:bg-slate-900 border border-primary/20 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all">
<option disabled="" selected="" value="">Select a team member</option>
<option value="1">Alex Johnson (Lead Designer)</option>
<option value="2">Sarah Miller (Senior Developer)</option>
<option value="3">Marcus Chen (Product Manager)</option>
<option value="4">Elena Rodriguez (QA Engineer)</option>
</select>
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-primary pointer-events-none">
<span class="material-symbols-outlined">person_add</span>
</div>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
</div>
<!-- Attachments Section (Visual Enhancement) -->
<div class="pt-2">
<button class="flex items-center gap-2 text-primary font-semibold text-sm hover:underline" type="button">
<span class="material-symbols-outlined text-xl">attach_file</span>
                        Add Attachments
                    </button>
</div>
<!-- Action Button -->
<div class="pt-6 border-t border-primary/10">
<button class="w-full h-14 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/25 hover:bg-primary/90 hover:scale-[0.99] transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined">check_circle</span>
                        Create Task
                    </button>
<button class="w-full mt-3 h-12 text-slate-500 font-medium rounded-xl hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors" type="button">
                        Cancel
                    </button>
</div>
</form>
</main>
<!-- Collaborators Preview Footer -->
<footer class="p-6 bg-slate-100 dark:bg-slate-900/50 mt-auto">
<h4 class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-4">Currently in Project</h4>
<div class="flex -space-x-3 overflow-hidden">
<img alt="" class="inline-block h-10 w-10 rounded-full ring-2 ring-background-light dark:ring-background-dark object-cover" data-alt="Female collaborator profile picture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAkt53SzdMCR_g2DyHsX-1lWABqRJztS-KN4s8BDurP8REqAlvCQMleXQC65tA4JMBtRa-69RnFV6aaaqaKSDFYlSMRo0RthsOLKQTockqTS0GXtpkPfYxcU7YGKpvrmVcrO0GzKNntpJD29SlZC_bePBByRMxs-03dTYJKibLkBLu2tSAd5bjNtnNDzHH8ShknkpPOaugQDKVJA9rMrwhVBWUzy-xT89XjIEm9BlkZ0X4xvhjxXU-FKOmppp1y_d2BwjnBNqSzBg"/>
<img alt="" class="inline-block h-10 w-10 rounded-full ring-2 ring-background-light dark:ring-background-dark object-cover" data-alt="Male collaborator profile picture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCXwtNHd3GF0Xo5ptCaH2Ebr8bGjeRixd_VAdylwHV32qZFyuZC2aN2K6rXUqN4K_4dIRoYKYRJQimJ649qoaNYIzawgyWVdO-oYCDFQiWUyWCr9NsZig9yI6eOLYhU7W1Dh36vQvfFJXTH2y-09wcOKfrHmuzK3sXe4Jx0OhgPwNUDdscACpQqK4ax9s2EmfV18gqkl1luv6O5MMEiEIO_RnzNKBxZT10fuiHi3MU0jCkFGyoafOc5848a1VZwvlMRU6XspWGfoA"/>

<img alt="" class="inline-block h-10 w-10 rounded-full ring-2 ring-background-light dark:ring-background-dark object-cover" data-alt="Male team member portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCmWGmMvi__rv_ch-ukv7FtB6h2DMFR6HoicouF0mv7VVV19M10vJIy5vv1tvlGHrshqTxFuMqcx9gqRFJVjirMEuAUAiCyx-1xfzsPxyL7JzjfPgP1i5Y22_quTUkcnCHGc85BGPQD2mqVL7ZnnhssqESgFtgpgHgNL4It87QhdtAF2Sp4du9HmF2cUr66SuAI9EEykcnUGbu_5-SbE_P0UQ1klEr1HqFORh_kgCsaT_txoBDIGcOxz-i_7NnqMuAq3TTQ4-6CHw"/>
<div class="flex h-10 w-10 items-center justify-center rounded-full bg-primary/20 ring-2 ring-background-light dark:ring-background-dark">
<span class="text-xs font-bold text-primary">+8</span>
</div>
</div>
</footer>
</div>
</body></html>

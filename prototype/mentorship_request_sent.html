<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Request Sent - MUST StarTrack</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#1152d4",
                "background-light": "#f6f6f8",
                "background-dark": "#101622",
              },
              fontFamily: {
                "display": ["Lexend"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<!-- Mobile Container -->
<div class="max-w-md w-full bg-white dark:bg-slate-900/50 rounded-xl shadow-xl overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Top Navigation (Subtle) -->
<div class="p-4 flex justify-end">
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-icons-round">close</span>
</button>
</div>
<!-- Success Content -->
<div class="px-8 pb-12 pt-4 flex flex-col items-center text-center">
<!-- Success Icon Animation-like Visual -->
<div class="relative mb-8">
<!-- Background Glow -->
<div class="absolute inset-0 bg-primary/20 rounded-full blur-2xl transform scale-150"></div>
<!-- Main Circle -->
<div class="relative w-24 h-24 bg-primary rounded-full flex items-center justify-center shadow-lg shadow-primary/30">
<span class="material-icons-round text-white text-5xl">check</span>
</div>
<!-- Decorative Elements -->
<div class="absolute -top-2 -right-2 w-6 h-6 bg-primary/40 rounded-full"></div>
<div class="absolute -bottom-1 -left-4 w-4 h-4 bg-primary/20 rounded-full"></div>
</div>
<!-- Heading -->
<h1 class="text-3xl font-bold mb-4 bg-gradient-to-r from-primary to-blue-600 bg-clip-text text-transparent">
                Request Sent!
            </h1>
<!-- Body Text -->
<p class="text-slate-600 dark:text-slate-400 leading-relaxed mb-10 px-2">
                Your mentorship request has been successfully delivered. The mentor will review your details shortly, and you'll receive a notification as soon as there's an update.
            </p>
<!-- Request Summary Card (Subtle) -->
<div class="w-full bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-800 rounded-xl p-4 mb-10 flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-slate-200 dark:bg-slate-700 overflow-hidden shrink-0">
<img class="w-full h-full object-cover" data-alt="Professional portrait of a mentor smiling" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDlqm4doBmxwGDa5777X8LyQinUTbfND-3gZhfI2NxVNplr_IENrzQo2qkqEsx6rJ_orCnmGHa91mb_zq38tssxxOGHWvn0-3wxwavyio3uEBaTnKldsbe0ymuz-VrJ3GSe_l2HZ4ub4af98ftSpwiq3ulEEaoqTWFNuH77rHq4bIygy9KGluXxdFDp9I4RbQ0lbDXsH0CWtrzvxziEszfnecx-EOOyknzVfUB_-I2aZgFKtM4Rq_lKtKyDeSH9d1meNcAxH3m1aQ"/>
</div>
<div class="text-left">
<p class="text-xs font-semibold uppercase tracking-wider text-primary/80 mb-0.5">Mentorship with</p>
<p class="font-medium text-slate-800 dark:text-slate-200">Dr. Sarah Jenkins</p>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full space-y-3">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-4 rounded-xl shadow-md transition-all active:scale-[0.98]">
                    View Request Status
                </button>
<button class="w-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-semibold py-4 rounded-xl transition-all active:scale-[0.98]">
                    Back to Discovery
                </button>
</div>
<!-- Support Link -->
<p class="mt-8 text-sm text-slate-500 dark:text-slate-500">
                Have questions? <a class="text-primary hover:underline font-medium" href="#">Contact Support</a>
</p>
</div>
<!-- Footer Accent -->
<div class="h-1.5 w-full bg-gradient-to-r from-primary/10 via-primary to-primary/10"></div>
</div>
</body></html>

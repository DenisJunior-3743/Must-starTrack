<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password - MUST StarTrack</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden max-w-md mx-auto shadow-xl">
<!-- Top App Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<a class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors" href="#">
<span class="material-symbols-outlined">arrow_back</span>
</a>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 ml-2">Forgot Password</h2>
</div>
<!-- Illustration / Hero Image -->
<div class="@container px-4 py-3">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-primary/10 rounded-xl min-h-[218px] border border-primary/20" data-alt="Academic building with modern university architecture" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAw98jb41_iTXyo_MoDVtwD2Vn9egFD9-0wku7yTpyjBQrQWvZqCMtvcEfREHOqImi2tYukuyR4u4ty3ThFX_BU554y58RoDZUGNk3KiD9XPh10PNgTyv1hhMh-y_Z9m1fCNeMlzpK0xaa2Pke3cstT8-4ogeqsZVJ6BUT_7ZZ2v5lrMWe2mqkpBMVHbx3oRpHqp10asixxJv8kLfbyPa1iDIFm73wLzGT8KyJRZ5vWHfs0OSKhdJXQZojqaoxi-D-tPi_Da9tCbA");'>
</div>
</div>
<!-- Content Section -->
<div class="px-4 pt-5 pb-2">
<h3 class="text-slate-900 dark:text-slate-100 tracking-tight text-2xl font-bold leading-tight">Reset your password</h3>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal mt-2">
                Enter your institutional email address and we'll send you a recovery link to regain access to your StarTrack account.
            </p>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-6 px-4 py-6">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">Institutional Email</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 pl-12 pr-4 text-base font-normal leading-normal transition-all" placeholder="e.g. name@std.must.ac.ug" type="email" value=""/>
</div>
<p class="text-xs text-slate-500 dark:text-slate-400 mt-2 px-1 italic">Must be a valid @std.must.ac.ug or @must.ac.ug address</p>
</label>
<!-- Action Button -->
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] hover:bg-primary/90 transition-colors shadow-lg shadow-primary/20">
<span class="truncate">Send Reset Link</span>
<span class="material-symbols-outlined ml-2 text-sm">send</span>
</button>
</div>
<!-- Footer Actions -->
<div class="mt-auto pb-10 px-4 text-center">
<p class="text-slate-600 dark:text-slate-400 text-sm font-medium">
                Remembered your password? 
                <a class="text-primary hover:underline font-bold ml-1" href="#">Back to Login</a>
</p>
</div>
<!-- Branding Decoration -->
<div class="h-2 bg-gradient-to-r from-primary/40 via-primary to-primary/40 w-full opacity-50"></div>
</div>
</body></html>

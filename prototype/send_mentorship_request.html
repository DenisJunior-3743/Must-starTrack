<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Request Mentorship - StarTrack</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Top App Bar -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 sticky top-0 z-10">
<button class="flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight flex-1 text-center pr-10">Request Mentorship</h2>
</header>
<!-- Mentor Summary Section -->
<div class="flex p-4 flex-col items-center">
<div class="flex w-full flex-col gap-4 items-center">
<div class="flex gap-4 flex-col items-center">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-32 w-32 ring-4 ring-primary/10" data-alt="Professional portrait of Dr. Alex Rivers smiling" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCtX2tT4oRgse_2EBwA9aQ2FjJAKn4HV-g9aqPW2SUD6OOPtiWO9WYLxwQdYoLpVyeM9njWPH0KoZQHZHp2bQMI5l4vmv8VPk89e5UvmC_yIFHhpeiDvdmj4LD3jKQqpCEGEjT2uxUcV4FfQGeNlNTO36XsxZAOjoz7fE5TpBLvLyE5qUmHmjcP_wvpP0LSfDbW0rTRiQQovQp_C5IK2AATC0wK4obcwTIl2uUtA4nfa2Q65X9rFZ6kNWOEV-nGsAV9FYwodsdaEw");'>
</div>
<div class="flex flex-col items-center justify-center text-center">
<p class="text-2xl font-bold leading-tight">Dr. Alex Rivers</p>
<p class="text-primary font-medium text-base">Senior Mentor | Computer Science</p>
</div>
</div>
</div>
</div>
<div class="px-4 space-y-6 pb-24">
<!-- Focus Areas (Multi-select) -->
<section>
<h3 class="text-lg font-bold leading-tight pb-3">Focus Areas</h3>
<div class="flex gap-3 flex-wrap">
<label class="cursor-pointer group">
<input class="hidden peer" type="checkbox"/>
<div class="flex h-10 items-center justify-center rounded-xl bg-primary/10 px-4 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary peer-checked:text-white transition-all">
<p class="text-sm font-medium">Career Strategy</p>
</div>
</label>
<label class="cursor-pointer group">
<input checked="" class="hidden peer" type="checkbox"/>
<div class="flex h-10 items-center justify-center rounded-xl bg-primary/10 px-4 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary peer-checked:text-white transition-all">
<p class="text-sm font-medium">Code Review</p>
</div>
</label>
<label class="cursor-pointer group">
<input class="hidden peer" type="checkbox"/>
<div class="flex h-10 items-center justify-center rounded-xl bg-primary/10 px-4 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary peer-checked:text-white transition-all">
<p class="text-sm font-medium">Research Guidance</p>
</div>
</label>
<label class="cursor-pointer group">
<input checked="" class="hidden peer" type="checkbox"/>
<div class="flex h-10 items-center justify-center rounded-xl bg-primary/10 px-4 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary peer-checked:text-white transition-all">
<p class="text-sm font-medium">Interview Prep</p>
</div>
</label>
</div>
</section>
<!-- Duration Selection -->
<section>
<h3 class="text-lg font-bold leading-tight pb-3">Duration</h3>
<div class="grid grid-cols-2 gap-3">
<label class="cursor-pointer">
<input checked="" class="hidden peer" name="duration" type="radio"/>
<div class="flex flex-col p-3 rounded-xl border-2 border-primary/20 bg-white dark:bg-slate-800 peer-checked:border-primary peer-checked:bg-primary/5 transition-all">
<span class="text-sm font-bold">Short-term</span>
<span class="text-xs text-slate-500 dark:text-slate-400">1-3 sessions</span>
</div>
</label>
<label class="cursor-pointer">
<input class="hidden peer" name="duration" type="radio"/>
<div class="flex flex-col p-3 rounded-xl border-2 border-primary/20 bg-white dark:bg-slate-800 peer-checked:border-primary peer-checked:bg-primary/5 transition-all">
<span class="text-sm font-bold">Ongoing</span>
<span class="text-xs text-slate-500 dark:text-slate-400">Periodic meetings</span>
</div>
</label>
</div>
</section>
<!-- Message to Mentor -->
<section>
<label class="flex flex-col gap-2">
<h3 class="text-lg font-bold leading-tight">Message to Mentor</h3>
<textarea class="form-textarea w-full rounded-xl border-primary/20 bg-white dark:bg-slate-800 focus:border-primary focus:ring-2 focus:ring-primary/20 min-h-[140px] p-4 text-base placeholder:text-slate-400 transition-all" placeholder="Share your personal goals and what you hope to achieve during this mentorship..."></textarea>
</label>
</section>
</div>
<!-- Sticky Footer Button -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-primary/10">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
<span class="material-symbols-outlined">send</span>
                Send Request
            </button>
</div>
</div>
</body></html>

<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Staff Registration - MUST StarTrack</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden pb-12">
<!-- Top App Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<div class="text-primary flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 ml-2">Staff Registration</h2>
</div>
<!-- Header Section -->
<div class="px-4 pt-6 pb-2">
<h2 class="text-slate-900 dark:text-slate-100 tracking-light text-[32px] font-bold leading-tight text-left">Join MUST StarTrack</h2>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal mt-2">Create your lecturer or staff account to manage academic tracks and student progress.</p>
</div>
<!-- Registration Form -->
<div class="flex flex-col gap-5 px-4 py-4 max-w-[540px]">
<!-- Full Name -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-base font-medium leading-normal">Full Name</span>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal" placeholder="e.g. Dr. John Doe" type="text"/>
</div>
</label>
<!-- Staff Email -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-base font-medium leading-normal">Staff Email</span>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal" placeholder="username@must.ac.ug" type="email"/>
</div>
<div class="flex items-center gap-2 mt-1 px-1">
<span class="material-symbols-outlined text-primary text-sm">info</span>
<p class="text-xs text-slate-500 dark:text-slate-400 italic">Must be a valid @must.ac.ug domain email address.</p>
</div>
</label>
<!-- Faculty Dropdown -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-base font-medium leading-normal">Faculty</span>
<div class="relative">
<select class="form-select flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 p-[15px] text-base font-normal leading-normal appearance-none">
<option disabled="" selected="" value="">Select Faculty</option>
<option value="fci">Computing and Informatics</option>
<option value="fast">Applied Sciences and Technology</option>
<option value="fom">Medicine</option>
<option value="fbs">Business Sciences</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</label>
<!-- Department Dropdown -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-base font-medium leading-normal">Department</span>
<div class="relative">
<select class="form-select flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 p-[15px] text-base font-normal leading-normal appearance-none">
<option disabled="" selected="" value="">Select Department</option>
<option value="cs">Computer Science</option>
<option value="it">Information Technology</option>
<option value="se">Software Engineering</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</label>
<!-- Password -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-base font-medium leading-normal">Password</span>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal" placeholder="Create a strong password" type="password"/>
<div class="absolute inset-y-0 right-0 flex items-center px-4 text-slate-500 cursor-pointer">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</label>
<!-- Action Button -->
<div class="pt-4 flex flex-col gap-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white text-lg font-bold h-14 rounded-xl shadow-lg transition-colors flex items-center justify-center gap-2">
<span>Create Staff Account</span>
<span class="material-symbols-outlined">person_add</span>
</button>
<div class="flex items-center justify-center py-2">
<p class="text-slate-600 dark:text-slate-400">Already have an account?</p>
<button class="ml-2 text-primary font-bold hover:underline">Back to Login</button>
</div>
</div>
</div>
<!-- Footer Logo/Branding -->
<div class="mt-auto flex flex-col items-center justify-center p-8 opacity-50">
<div class="flex items-center gap-2">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl">star</span>
</div>
<span class="font-bold tracking-tight text-slate-900 dark:text-slate-100">MUST StarTrack</span>
</div>
<p class="text-xs mt-2 text-slate-500">Mbarara University of Science and Technology</p>
</div>
</div>
</body></html>

<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden mx-auto max-w-md shadow-2xl">
<!-- Top Navigation -->
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">
                Password Reset
            </h2>
</div>
<!-- Main Content Area -->
<div class="flex flex-col px-6 py-10 flex-grow">
<div class="flex flex-col items-center gap-8">
<!-- Success Illustration -->
<div class="relative flex items-center justify-center w-full max-w-[280px] aspect-square rounded-full bg-primary/5 dark:bg-primary/10 mb-4">
<div class="absolute inset-0 flex items-center justify-center opacity-20">
<div class="w-48 h-48 bg-primary rounded-full blur-3xl"></div>
</div>
<div class="relative z-10 flex flex-col items-center justify-center text-primary">
<div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-xl shadow-primary/20 border border-primary/10">
<span class="material-symbols-outlined text-7xl font-light">mark_email_read</span>
</div>
<div class="absolute -bottom-2 -right-2 bg-green-500 text-white p-3 rounded-full shadow-lg border-4 border-background-light dark:border-background-dark">
<span class="material-symbols-outlined text-2xl">check</span>
</div>
</div>
</div>
<!-- Text Content -->
<div class="flex max-w-[480px] flex-col items-center gap-4 text-center">
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight tracking-tight">
                        Check your email
                    </h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed">
                        We've sent a password reset link to your 
                        <span class="font-semibold text-primary">MUST institutional email address</span>. 
                        Please click the link in the email to create a new password.
                    </p>
</div>
<!-- Primary Action -->
<div class="w-full mt-6">
<button class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-4 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] shadow-lg shadow-primary/30 active:scale-[0.98] transition-all">
<span class="truncate">Back to Login</span>
</button>
</div>
</div>
</div>
<!-- Bottom Actions -->
<div class="flex flex-col items-center pb-10 px-6 gap-2">
<p class="text-slate-500 dark:text-slate-500 text-sm font-normal leading-normal">
                Didn't receive the email?
            </p>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-6 bg-primary/10 dark:bg-primary/20 text-primary text-sm font-bold leading-normal tracking-[0.015em] hover:bg-primary/20 dark:hover:bg-primary/30 transition-colors">
<span class="truncate">Resend Email</span>
</button>
</div>
<!-- Decorative Element -->
<div class="h-2 w-32 bg-slate-300 dark:bg-slate-700 rounded-full mx-auto mb-2 opacity-50"></div>
</div>
</body></html>

name: must_startrack
description: >
  MUST StarTrack — Skill-centric academic networking platform for
  Mbarara University of Science and Technology (MUST).
  Connects students, lecturers, and opportunities through a
  digital portfolio and collaboration ecosystem.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.2.0 <4.0.0"

# ─────────────────────────────────────────────────────────────
# DEPENDENCIES
# ─────────────────────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Firebase / Remote Storage ──────────────────────────────
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.7.7
  firebase_messaging: ^14.9.4
  google_sign_in: ^6.2.1

  # ── Local Storage ──────────────────────────────────────────
  # sqflite: SQLite ORM for offline-first local database
  sqflite: ^2.3.3+1
  # sqflite_common_ffi for desktop/test support
  sqflite_common_ffi: ^2.3.3
  # path: resolves database file paths on device
  path: ^1.9.0
  # shared_preferences: lightweight key-value for session/prefs
  shared_preferences: ^2.2.3
  # flutter_secure_storage: encrypted storage for tokens/keys
  flutter_secure_storage: ^9.0.0

  # ── State Management ───────────────────────────────────────
  # flutter_bloc: BLoC pattern — separates UI from business logic
  flutter_bloc: ^8.1.5
  # equatable: value-equality for BLoC states/events
  equatable: ^2.0.5

  # ── Dependency Injection ───────────────────────────────────
  # get_it: service locator — registers all repos/services once
  get_it: ^7.6.7

  # ── Navigation ─────────────────────────────────────────────
  # go_router: declarative routing with deep-link and guard support
  go_router: ^13.2.0

  # ── Networking ─────────────────────────────────────────────
  # dio: HTTP client for Gemini API calls
  dio: ^5.4.3+1
  # connectivity_plus: detects online/offline state for sync
  connectivity_plus: ^6.0.3

  # ── UI & Theming ───────────────────────────────────────────
  # google_fonts: provides Lexend (matches HTML prototypes exactly)
  google_fonts: ^6.2.1
  # material_symbols_icons: Material Symbols Outlined icon set
  material_symbols_icons: ^4.2815.0
  # flutter_svg: renders SVG assets (logos, illustrations)
  flutter_svg: ^2.0.10+1
  # cached_network_image: caches remote images with placeholders
  cached_network_image: ^3.3.1
  # shimmer: skeleton loading effect (HCI: feedback principle)
  shimmer: ^3.0.0
  # lottie: JSON animations for splash, empty states, streak badges
  lottie: ^3.1.0

  # ── Media ──────────────────────────────────────────────────
  # image_picker: camera + gallery access
  image_picker: ^1.1.2
  # flutter_image_compress: compress images to ≤1.5MB limit
  flutter_image_compress: ^2.2.0
  # video_compress: compress videos to ≤2 min / size limits
  video_compress: ^3.1.2
  # video_player: plays uploaded project videos
  video_player: ^2.8.3
  # youtube_player_flutter: embeds YouTube project links
  youtube_player_flutter: ^9.0.4
  # photo_view: pinch-to-zoom project images
  photo_view: ^0.15.0

  # ── Feed & Lists ───────────────────────────────────────────
  # infinite_scroll_pagination: paginated lazy-loading feeds
  infinite_scroll_pagination: ^4.0.0
  # flutter_staggered_animations: staggered list entry animations
  flutter_staggered_animations: ^1.1.1

  # ── Forms & Validation ─────────────────────────────────────
  # form_builder_validators: reg-number, email, password validators
  form_builder_validators: ^11.0.0

  # ── Charts & Analytics ─────────────────────────────────────
  # fl_chart: admin analytics charts (bar, line, pie)
  fl_chart: ^0.67.0

  # ── Notifications ──────────────────────────────────────────
  # flutter_local_notifications: in-app notification banners
  flutter_local_notifications: ^17.1.2

  # ── File & Export ──────────────────────────────────────────
  # path_provider: locates app documents directory
  path_provider: ^2.1.3
  # open_file: opens exported PDF/CSV reports
  open_file: ^3.3.2
  # share_plus: native share sheet for posts
  share_plus: ^9.0.0
  # url_launcher: opens external links (GitHub, demo sites)
  url_launcher: ^6.3.0

  # ── Utilities ──────────────────────────────────────────────
  # intl: date/time formatting (Ugandan locale)
  intl: ^0.20.2
  # uuid: generates unique IDs for offline-queued operations
  uuid: ^4.4.0
  # collection: dart collection utilities
  collection: ^1.18.0
  # rxdart: reactive streams for real-time messaging
  rxdart: ^0.28.0
  # dartz: functional error handling (Either<Failure, Data>)
  dartz: ^0.10.1
  # relative timestamps in feeds/messages
  timeago: ^3.7.1

  # ── Permissions ────────────────────────────────────────────
  # permission_handler: camera, storage, notification permissions
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # bloc_test: unit-tests for BLoC state machines
  bloc_test: ^9.1.7
  # mocktail: mock dependencies in tests
  mocktail: ^1.0.4
  # build_runner: code generation
  build_runner: ^2.4.9
  # integration_test: end-to-end UI tests
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  # ── Assets ─────────────────────────────────────────────────
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  # Note: Lexend is loaded via google_fonts package at runtime,
  # no manual font declaration needed.
